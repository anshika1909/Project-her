<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>For Akrita ❤️</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Cormorant+Garamond:wght@500;600;700&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="style.css">

</head>

<body>

<!-- ===================== -->
<!-- GOLDEN FAIRY LIGHTS -->
<!-- ===================== -->

<div id="lights"></div>



<!-- ===================== -->
<!-- PAGE 1 -->
<!-- ===================== -->

<section
id="page1"
class="page active">

<div class="content">

<h1 class="heading">

A Surprise Awaits You...

<span>⭐</span>

</h1>

<p class="subHeading">

✨ Something special,
just for you ✨

</p>



<div
class="giftContainer"
onclick="openGift()">

<div class="gift">

<div class="giftLid"></div>

<div class="giftBox"></div>

<div class="ribbonVertical"></div>

<div class="ribbonHorizontal"></div>

</div>

</div>



<p class="tapText">

Tap the gift
to begin the magic...

</p>

</div>

</section>



<!-- ===================== -->
<!-- PAGE 2 -->
<!-- ===================== -->

<section
id="page2"
class="page">

<div class="content">

<div class="lockContainer">

<div class="lockTop"></div>

<div class="lockBody"></div>

</div>

<h2>

Only someone special
knows the secret...

💛

</h2>

<input

id="pin"

type="password"

maxlength="4"

placeholder="Enter PIN"

>



<button

class="unlockBtn"

onclick="checkPin()">

Unlock

</button>

<p id="error"></p>

</div>

</section>

 <!-- ===================== -->
<!-- LOADING PAGE -->
<!-- ===================== -->

<section
id="loadingPage"
class="page">

<div class="content loadingContent">

<h2 class="loadingHeading">

Loading something
special for you...

</h2>

<div class="loader">

<span></span>
<span></span>
<span></span>

</div>

</div>

</section>



<!-- ===================== -->
<!-- PAGE 3 -->
<!-- ===================== -->

<section
id="page3"
class="page">

<div class="content revealContent">

<h2 class="birthdayText">

Happiest Birthday

</h2>

<h2 class="birthdayText">

To You

</h2>

<h1 class="akritaName">

AKRITA ❤️

</h1>

<p class="monkeyText">

🧿My monkey🐒

</p>



<div class="cakeContainer">

<div class="cake">

<div class="cakeLayer one"></div>

<div class="cakeLayer two"></div>

<div class="cakeLayer three"></div>

<div class="candle">

<div class="flame"></div>

</div>

</div>

</div>



<p class="wishLine">

🌠 Make a wish...

</p>



<button

class="memoryButton">

See Our Memories →

</button>

</div>

</section>

 <script>

function showPage(pageId){

document.querySelectorAll(".page").forEach(page=>{
page.classList.remove("active");
});

document.getElementById(pageId).classList.add("active");

}



function openGift(){

const gift=document.querySelector(".gift");

gift.classList.add("giftOpen");

setTimeout(()=>{

showPage("page2");

gift.classList.remove("giftOpen");

},900);

}



function checkPin(){

const pin=document.getElementById("pin").value;

const error=document.getElementById("error");

if(pin==="1909"){

error.innerHTML="";

showPage("loadingPage");

setTimeout(()=>{

showPage("page3");

},2200);

}

else{

error.innerHTML="❌ Wrong PIN. Try Again.";

}

}



// Fairy Lights

const lights=document.getElementById("lights");

for(let i=0;i<45;i++){

const light=document.createElement("span");

light.className="light";

light.style.left=Math.random()*100+"vw";

light.style.animationDelay=Math.random()*8+"s";

light.style.animationDuration=
6+Math.random()*6+"s";

light.style.width=
8+Math.random()*18+"px";

light.style.height=
light.style.width;

lights.appendChild(light);

}

 </script>

 </body>
</html>
