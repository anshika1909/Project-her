<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For Akrita ❤️</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Cormorant+Garamond:wght@400;600;700&display=swap" rel="stylesheet">

<style>
/* PART 2 CSS YAHAN AAYEGI */
</style>

</head>

<body>

<!-- Fairy Lights Background -->
<div id="lights"></div>

<!-- PAGE 1 -->
<section id="page1" class="page active">

<div class="content">

<h1 class="main-title">
A Surprise Awaits You... ⭐
</h1>

<p class="subtitle">
✨ Something special, just for you ✨
</p>

<div class="gift-wrapper" onclick="openGift()">

<div class="gift-box">
<div class="gift-lid"></div>
<div class="gift-ribbon-v"></div>
<div class="gift-ribbon-h"></div>
</div>

</div>

<p class="tap-text">
Tap the gift to begin the magic...
</p>

</div>

</section>



<!-- PAGE 2 -->
<section id="page2" class="page">

<div class="content">

<div class="lock-icon">
<div class="lock-top"></div>
<div class="lock-body"></div>
</div>

<h2 class="lock-title">
Only someone special knows the secret... 💛
</h2>

<input
type="password"
id="pinInput"
maxlength="4"
placeholder="Enter PIN"
/>

<button class="unlock-btn" onclick="checkPin()">
Unlock
</button>

<p id="errorText"></p>

</div>

</section>



<!-- LOADING PAGE -->
<section id="loadingPage" class="page">

<div class="content">

<h2 class="loading-text">
Loading something special for you...
</h2>

<div class="loader">
<span></span>
<span></span>
<span></span>
</div>

</div>

</section>



<!-- PAGE 3 -->
<section id="page3" class="page">

<div class="content reveal-content">

<h2 class="birthday-line">
Happiest Birthday
</h2>

<h2 class="birthday-line">
To You
</h2>

<h1 class="akrita">
AKRITA ❤️
</h1>

<p class="monkey">
🧿My monkey🐒
</p>

<div class="big-cake">
🎂
</div>

<p class="wish-text">
🌠 Make a wish...
</p>

<button class="memory-btn">
See Our Memories →
</button>

</div>

</section>



<script>
/* PART 1B JAVASCRIPT YAHAN AAYEGI */
</script>

</body>
</html>
