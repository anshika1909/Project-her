<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Akrita ❤️</title>

<style>

body{
margin:0;
background:#000;
color:white;
font-family:Arial,sans-serif;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
}

.container{
padding:20px;
animation:fade 2s ease;
}

h1{
font-size:42px;
margin-bottom:15px;
}

p{
font-size:20px;
color:#ddd;
}

button{
margin-top:35px;
padding:15px 35px;
border:none;
border-radius:40px;
font-size:18px;
background:white;
color:black;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.08);
}

@keyframes fade{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>

</head>

<body>

<div class="container">

<h1>Happy Birthday, Akrita! 🎉❤️</h1>
<h2>19 September 2026</h2>

<p>
Before you continue...
</p>

<p>
I made something for you.
</p>

<button onclick="startJourney()">
🎂 Start Celebration
</button>

</div>

<script>

function startJourney(){

window.location.href = "#celebration";

}

</script>
<div id="celebration" style="height:100vh;display:flex;justify-content:center;align-items:center;flex-direction:column;background:#111;">

<h1>🎂 Happy Birthday Akrita ❤️</h1>

<p>Close your eyes and make a wish...</p>

<button onclick="blowCandle()">🕯️ Blow Out Candle</button>

<p id="wish"></p>

</div>

<script>
function blowCandle(){
document.getElementById("wish").innerHTML =
"✨ I hope every wish you made today comes true. ❤️";
}
</script>
</body>

  </html>
