<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Akrita ❤️</title>

<style>

body{
margin:0;
background:linear-gradient(135deg,#020024,#090979,#00d4ff);
color:white;
font-family:Arial,sans-serif;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
}

.container{
padding:20px;
animation:fade 2s ease;
}

h1{
font-size:42px;
margin-bottom:15px;
}

p{
font-size:20px;
color:#ddd;
}

button{
margin-top:35px;
padding:15px 35px;
border:none;
border-radius:40px;
font-size:18px;
background:white;
color:black;
cursor:pointer;
transition:.3s;
box-shadow:0 0 20px #00d4ff;
}

button:hover{
transform:scale(1.08);
}

@keyframes fade{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

  .heart{
position:absolute;
color:#00d4ff;
font-size:25px;
animation:float 6s infinite;
}

@keyframes float{
0%{
transform:translateY(100vh);
opacity:0;
}
50%{
opacity:1;
}
100%{
transform:translateY(-10vh);
opacity:0;
}
}
  
</style>

</head>

<body>

<div class="heart" style="left:10%;">💙</div>
<div class="heart" style="left:30%;animation-delay:2s;">✨</div>
<div class="heart" style="left:50%;animation-delay:4s;">💙</div>
<div class="heart" style="left:75%;animation-delay:1s;">✨</div>
  
<div class="container">

<h1>Happy Birthday, Akrita! 🎉❤️</h1>
<h2>19 September 2026</h2>

<p>
Before you continue...
</p>

<p>
I made something for you.
</p>

<button onclick="startJourney()">
🎂 Start Celebration
</button>

</div>

<script>
function startJourney(){
  document.querySelector(".container").style.display="none";
  document.getElementById("celebration").style.display="flex";
}
</script>
  
<div id="celebration" style="height:100vh;width:100%;display:none;justify-content:center;align-items:center;flex-direction:column;background:#111;position:relative;">
<h1>🎂 Happy Birthday Akrita ❤️</h1>

<p>Close your eyes and make a wish...</p>

<button onclick="blowCandle()">🕯️ Blow Out Candle</button>
</div>
  
<p id="wish" style="position:absolute; top:85%; left:0; width:100%; text-align:center;"></p>

</div>

<script>
function blowCandle(){
document.getElementById("wish").innerHTML =
"✨ I hope every wish you made today comes true. ❤️";
}
</script>

  
</body>

  </html>
