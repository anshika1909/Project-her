<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Akrita ❤️</title>

<style>

body{
margin:0;
background:linear-gradient(135deg,#020024,#090979,#00d4ff);
color:white;
font-family:Arial,sans-serif;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
}

.container{
padding:20px;
animation:fade 2s ease;
}

h1{
font-size:42px;
margin-bottom:15px;
}

p{
font-size:20px;
color:#ddd;
}

button{
margin-top:35px;
padding:15px 35px;
border:none;
border-radius:40px;
font-size:18px;
background:white;
color:black;
cursor:pointer;
transition:.3s;
box-shadow:0 0 20px #00d4ff;
}

button:hover{
transform:scale(1.08);
}

@keyframes fade{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.heart{
position:fixed;
left:50%;
bottom:-50px;
font-size:40px;
animation:rise 5s infinite;
z-index:10;
}

@keyframes rise{
0%{
transform:translateY(0);
opacity:1;
}
100%{
transform:translateY(-100vh);
opacity:0;
}
}
.blue{
color:#00d4ff;
}

.purple{
color:#b56cff;
}

.white{
color:white;
}

.cake{
font-size:90px;
animation:bounce 2s infinite;
filter:drop-shadow(0 0 20px #00d4ff);
}

@keyframes bounce{
0%,100%{
transform:translateY(0);
}
50%{
transform:translateY(-15px);
}
}  

.flame{
font-size:45px;
position:absolute;
top:22%;
left:50%;
transform:translateX(-50%);
animation:flicker .8s infinite alternate;
filter:drop-shadow(0 0 15px orange);
}

.wind{
font-size:40px;
position:absolute;
top:22%;
left:25%;
opacity:0;
}

.wind.blow{
animation:windMove 1s forwards;
}

@keyframes windMove{
0%{
opacity:0;
transform:translateX(0);
}
50%{
opacity:1;
transform:translateX(80px);
}
100%{
opacity:0;
transform:translateX(140px);
}
}
</style>

</head>

<body>

<div class="heart blue" style="left:10%;animation-delay:1s;">♥</div>
<div class="heart purple" style="left:30%;animation-delay:3s;">♥</div>
<div class="heart white" style="left:50%;animation-delay:5s;">♥</div>
<div class="heart blue" style="left:75%;animation-delay:2s;">♥</div>
<div class="heart purple" style="left:90%;animation-delay:4s;">♥</div>
<div class="heart purple" style="left:20%;animation-delay:2s;">🌸</div>
<div class="heart white" style="left:40%;animation-delay:4s;">✨</div>
<div class="heart blue" style="left:65%;animation-delay:1s;">🌷</div>
<div class="heart purple" style="left:85%;animation-delay:3s;">🌸</div>
<div class="container">

<div class="cake">
🎂
</div>
<h1>Happy Birthday, Akrita! 🎉❤️</h1>
<h2>19 September 2026</h2>

<p>
Before you continue...
</p>

<p>
I made something for you.
</p>

<button onclick="startJourney()">
🎂 Start Celebration
</button>

</div>

<script>
function startJourney(){
  document.querySelector(".container").style.display="none";
  document.getElementById("celebration").style.display="flex";
}
</script>
  
<div id="celebration" style="height:100vh;width:100%;display:none;justify-content:center;align-items:center;flex-direction:column;background:linear-gradient(135deg,#020024,#090979,#00d4ff);position:relative;">
<h1>🎂 Happy Birthday Akrita ❤️</h1>

<p>Close your eyes and make a wish...</p>

<div class="flame">🔥</div>
<div class="wind">💨</div>
<button onclick="blowCandle()">🕯️ Blow Out Candle</button>
</div>
  
<p id="wish" style="position:absolute; top:85%; left:0; width:100%; text-align:center;"></p>

</div>

<script>
function blowCandle(){

let wind = document.querySelector(".wind");
let flame = document.querySelector(".flame");
document.querySelector(".wind").classList.add("blow");

setTimeout(()=>{
document.querySelector(".flame").style.display="none";
},1000);

let text = "✨ I hope every wish you made today comes true. ❤️";
let i = 0;
let wish = document.getElementById("wish");

wish.innerHTML = "";

let typing = setInterval(function(){

wish.innerHTML += text.charAt(i);
i++;

if(i >= text.length){
clearInterval(typing);
}

},70);

  }
</script>

  
</body>

  </html>
